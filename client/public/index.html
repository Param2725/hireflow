<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireFlow</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary-fixed-variant": "#3c475a",
            "on-background": "#191c1e",
            "on-surface-variant": "#45474c",
            "on-surface": "#191c1e",
            "surface-variant": "#e0e3e5",
            "surface-container-high": "#e6e8ea",
            "primary": "#091426",
            "background": "#f7f9fb",
            "surface": "#f7f9fb",
            "surface-container-low": "#f2f4f6",
            "on-primary": "#ffffff",
            "outline-variant": "#c5c6cd",
            "surface-container": "#eceef0",
            "outline": "#75777d",
            "secondary": "#0058be",
            "on-secondary": "#ffffff",
            "secondary-container": "#2170e4",
            "secondary-fixed": "#d8e2ff",
            "secondary-fixed-dim": "#adc6ff",
            "primary-container": "#1e293b",
            "on-primary-container": "#8590a6",
            "surface-container-lowest": "#ffffff",
            "surface-container-highest": "#e0e3e5",
            "on-tertiary-container": "#00a472",
            "tertiary-container": "#00301e",
            "tertiary-fixed": "#6ffbbe",
            "on-tertiary": "#ffffff",
            "error": "#ba1a1a",
            "error-container": "#ffdad6",
            "on-error": "#ffffff",
            "inverse-surface": "#2d3133",
            "inverse-on-surface": "#eff1f3",
            "inverse-primary": "#bcc7de",
            "surface-tint": "#545f73",
            "surface-dim": "#d8dadc",
            "surface-bright": "#f7f9fb"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            xs: "4px",
            sm: "12px",
            md: "24px",
            lg: "40px",
            xl: "64px",
            gutter: "24px",
            base: "8px"
          },
          fontSize: {
            "headline-xl": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "headline-lg": ["28px", { lineHeight: "36px", letterSpacing: "-0.01em", fontWeight: "700" }],
            "headline-md": ["20px", { lineHeight: "28px", fontWeight: "600" }],
            "headline-sm": ["16px", { lineHeight: "24px", fontWeight: "600" }],
            "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
            "label-md": ["14px", { lineHeight: "20px", letterSpacing: "0.05em", fontWeight: "500" }],
            "label-sm": ["12px", { lineHeight: "16px", fontWeight: "600" }]
          }
        }
      }
    }
  </script>

  <style>
    * {
      font-family: 'Inter', sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .tonal-layer-1 {
      background-color: #ffffff;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05),
        0 2px 4px -2px rgb(0 0 0 / 0.05);
    }

    .form-input-focus:focus {
      border-color: #3B82F6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
      outline: none;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .level-1-shadow {
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05),
        0 2px 4px -2px rgb(0 0 0 / 0.05);
    }

    .input-focus-ring:focus {
      border-color: #3B82F6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
      outline: none;
    }

    .job-card-hover {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .job-card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
    }

    .job-content h2 {
      font-weight: 700;
      font-size: 1.25rem;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
      color: #091426;
    }

    .job-content p {
      margin-bottom: 1rem;
      color: #45474c;
      line-height: 1.6;
    }

    .job-content ul {
      list-style-type: disc;
      margin-left: 1.25rem;
      margin-bottom: 1rem;
      color: #45474c;
    }

    .job-content li {
      margin-bottom: 0.5rem;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8e5;
      border-radius: 10px;
    }

    .glass-effect {
      backdrop-filter: blur(8px);
      background-color: rgba(9, 20, 38, 0.4);
    }

    .application-card {
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1),
        box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .application-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }

    .custom-shadow {
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
    }

    .card-hover {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.08);
    }
  </style>
</head>

<body class="bg-surface text-on-surface">
  <div id="root"></div>
</body>

</html>
